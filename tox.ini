[tox]
env_list = py{310,311,312,313,314,314t}, lint, type
runner = uv
# Enable tox-uv optimizations
uv_seed = true

[testenv]
# Use tox-uv for enhanced performance
deps =
    pytest
    pytest-cov
    pytest-asyncio
commands = pytest {posargs:tests --cov=youtrack_cli --cov-report=xml}

[testenv:lint]
deps = ruff
commands =
    ruff check
    ruff format --check

[testenv:type]
# Pin ty: it is pre-release alpha software, so an unpinned dep lets a new
# release break CI unexpectedly. Keep in sync with the version in uv.lock.
deps = ty==0.0.1a14
commands = ty check --ignore call-non-callable --ignore unresolved-attribute --ignore invalid-assignment --ignore invalid-argument-type --ignore unresolved-import --ignore invalid-method-override youtrack_cli

[testenv:format]
deps = ruff
commands = ruff format

[testenv:fix]
deps = ruff
commands = ruff check --fix
