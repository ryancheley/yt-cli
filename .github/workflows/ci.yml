name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

# Cancel superseded runs on the same ref so new pushes don't queue behind stale ones.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Full gate runs on PRs. Pushes to protected branches (post-merge) only run
    # the lightweight coverage-baseline job below, since the PR was already tested
    # against the latest base (branch protection requires up-to-date branches).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 3.15t (free-threaded) is omitted until cryptography ships free-threaded
        # 3.15 wheels; building from source yields an abi3 wheel that the
        # free-threaded ABI can't load. Re-add once upstream wheels exist.
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.14t", "3.15"]

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
      with:
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v4
      with:
        version: "latest"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true

    - name: Install dependencies and run tests with tox-uv
      run: uvx --with tox-uv tox -e py$(echo ${{ matrix.python-version }} | tr -d '.')

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v4
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      continue-on-error: true

  lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
      with:
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v4
      with:
        version: "latest"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5
      with:
        python-version: "3.11"

    - name: Run lint with tox-uv
      run: uvx --with tox-uv tox -e lint

  type-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
      with:
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v4
      with:
        version: "latest"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5
      with:
        python-version: "3.11"

    - name: Run type check with tox-uv
      run: uvx --with tox-uv tox -e type

  security:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
      with:
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v4
      with:
        version: "latest"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5
      with:
        python-version: "3.11"

    - name: Run security check
      run: uvx zizmor .github/workflows/

  documentation:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
      with:
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v4
      with:
        version: "latest"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5
      with:
        python-version: "3.11"

    - name: Install dependencies and build documentation
      run: |
        uv sync --no-default-groups --group docs
        uv run python -c "import sphinx; print('Sphinx version:', sphinx.__version__)"
        uv run python -m sphinx -b html docs docs/_build/html --keep-going
        uv run python -m sphinx -b doctest docs docs/_build/doctest
        echo "Documentation testing infrastructure is in place"
        echo "RST files found:" && find docs/ -name "*.rst" | wc -l

  # Summary job for branch protection (PR-only; pushes are not gated)
  tests-complete:
    name: test
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [test, lint, type-check, security, documentation]
    steps:
      - name: Check all jobs
        env:
          TEST_RESULT: ${{ needs.test.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          TYPE_CHECK_RESULT: ${{ needs.type-check.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
          DOCUMENTATION_RESULT: ${{ needs.documentation.result }}
        run: |
          if [[ "$TEST_RESULT" == "success" &&
                "$LINT_RESULT" == "success" &&
                "$TYPE_CHECK_RESULT" == "success" &&
                "$SECURITY_RESULT" == "success" &&
                "$DOCUMENTATION_RESULT" == "success" ]]; then
            echo "All checks passed"
            exit 0
          else
            echo "Some checks failed"
            exit 1
          fi

  # Lightweight post-merge run: refreshes the Codecov baseline for the default
  # branch without re-running the full matrix + lint/type/security/docs, which
  # the PR already validated. Runs only on pushes (e.g. after a squash merge).
  coverage-baseline:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
      with:
        persist-credentials: false

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v4
      with:
        version: "latest"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5
      with:
        python-version: "3.11"

    - name: Run tests with coverage
      run: uvx --with tox-uv tox -e py311

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v4
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      continue-on-error: true
